<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prendre un rendez-vous | Vita Thérapie</title>

    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="responsive.css">

    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
</head>

<body>

    <!-- Header -->
    <header>
        <nav class="navbar">

            <div class="logo">
                Vita Thérapie
            </div>

            <ul class="nav-links">
                <li><a href="index.html">Accueil</a></li>
                <li><a href="index.html#about">À propos</a></li>
                <li><a href="index.html#service">Services</a></li>
                <li><a href="index.html#contact">Contact</a></li>
            </ul>

            <a href="index.html" class="btn">Retour</a>

        </nav>
    </header>

    <!--code de formulaire de rendez-vous-->

    <main class="appointment">

        <div class="appointment-form">
<h1>Prendre un rendez-vous</h1>
<p>Remplissez le formulaire ci-dessous.</p>

<form action="https://formsubmit.co/vitatherapie1@gmail.com" method="POST">

    <input type="hidden" name="_captcha" value="false">

<input type="hidden" name="_subject" value="Nouveau rendez-vous - Vita Thérapie">

<input type="hidden" name="_template" value="table">

<input type="hidden" name="_next" value="http://127.0.0.1:5500/merci.html">

<!--alkhanat-->



    <label>Nom complet</label>
    <input type="text" name="Nom" placeholder="Votre Nom" required>

    <label>Téléphone</label>
    <input type="tel" name="telephone" placeholder="+212 6 XX XX XX XX" required>

    <label>Email</label>
    <input type="email" name="email" placeholder="exemple@email.com" required>

    <label>Service</label>
    <select name="service" required>
        <option>Kinésithérapie</option>
        <option>Massage thérapeutique</option>
        <option>Rééducation</option>
        <option>Consultation</option>
    </select>

    <label>Date</label>
    <input type="date" name="Date" required>

    <label>Heure</label>
    <input type="time" name="Heure" required>

    <label>Message</label>
    <textarea rows="message" rows="5" placeholder="Votre message..."></textarea>

    <button type="submit" class="btn">
        Confirmer le rendez-vous
    </button>

</form>
        </div>
        <div class="appointment-image">
            <img src="3.jpg" alt="vita therapie">
        </div>
    </main>

    <script type="module" src="firebase.js"></script>
<script type="module" src="app.js"></script>

<script type="module" src="js/appointment.js"></script>
</body>

</html>
